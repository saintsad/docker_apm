service:
  phpmyadmin:
    image: lscr.io/linuxserver/phpmyadmin:latest
    container_name: apm-phpmyadmin
    depends_on:
      - db
    restart: unless-stopped      # [수정] 재시작 정책 추가
    environment:
      PUID: 1000
      PGID: 1000
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      PMA_ARBITRARY: 1
      TZ: Asia/Seoul
    ports:
      - "8081:80" 
    volumes:
      - ./config/pma-config/config.inc.php:/config/phpmyadmin/config.inc.php
    networks:                    # [수정] 네트워크 할당
      - apm-network
    logging:                     # [수정] 로그 제한 추가
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"   

  tunnel:
    depends_on:
      - web
      - phpmyadmin