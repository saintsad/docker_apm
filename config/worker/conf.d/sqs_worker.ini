[program:sqs-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/worker/worker.php ; 실행할 스크립트 경로
autostart=true                       ; 컨테이너 시작 시 자동 실행
autorestart=true                     ; 스크립트가 죽으면 즉시 재시작
numprocs=2                           ; 동시에 띄울 워커 프로세스 개수 (트래픽에 따라 조절)

; [안전장치 3] 로그 무한 증식 방지 (각 파일 최대 10MB, 백업 3개 보관)
stdout_logfile=/var/log/sqs-worker.out.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3

stderr_logfile=/var/log/sqs-worker.err.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3