services:
  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: apm-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # 로컬 개발 편의를 위해 보안 임시 해제
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 메모리 제한 (서버 환경에 맞춰 조절)
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - apm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  es-data: